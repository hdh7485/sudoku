<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스도쿠</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 로그인/회원가입 화면 -->
        <div id="auth-screen" class="screen active">
            <div class="auth-container">
                <h1>스도쿠</h1>
                <p class="subtitle" id="auth-subtitle">로그인</p>
                <form class="auth-form" id="auth-form">
                    <input type="text" id="auth-username" placeholder="아이디" autocomplete="username" maxlength="20">
                    <input type="password" id="auth-password" placeholder="비밀번호" autocomplete="current-password">
                    <div class="auth-error" id="auth-error"></div>
                    <button type="submit" class="btn-primary" id="auth-submit">로그인</button>
                </form>
                <div class="auth-toggle" id="auth-toggle">
                    계정이 없으신가요? <a id="auth-switch">회원가입</a>
                </div>
                <div class="guest-link">
                    <a id="guest-login">게스트로 플레이</a>
                </div>
            </div>
        </div>

        <!-- 메인 화면: 난이도 선택 -->
        <div id="home-screen" class="screen">
            <div class="user-header">
                <span class="user-info"><strong id="display-username"></strong>님</span>
                <button class="btn-logout" id="btn-logout">로그아웃</button>
            </div>
            <h1>스도쿠</h1>
            <p class="subtitle">난이도를 선택하세요</p>
            <div class="difficulty-list">
                <div class="difficulty-card" data-difficulty="easy">
                    <div class="difficulty-header">
                        <span class="difficulty-name">쉬움</span>
                        <span class="difficulty-stars">&#9733;</span>
                    </div>
                    <div class="difficulty-progress">
                        <div class="progress-bar"><div class="progress-fill" id="progress-easy"></div></div>
                        <span class="progress-text" id="progress-text-easy">0 / 10</span>
                    </div>
                </div>
                <div class="difficulty-card" data-difficulty="medium">
                    <div class="difficulty-header">
                        <span class="difficulty-name">보통</span>
                        <span class="difficulty-stars">&#9733;&#9733;</span>
                    </div>
                    <div class="difficulty-progress">
                        <div class="progress-bar"><div class="progress-fill" id="progress-medium"></div></div>
                        <span class="progress-text" id="progress-text-medium">0 / 10</span>
                    </div>
                </div>
                <div class="difficulty-card" data-difficulty="hard">
                    <div class="difficulty-header">
                        <span class="difficulty-name">어려움</span>
                        <span class="difficulty-stars">&#9733;&#9733;&#9733;</span>
                    </div>
                    <div class="difficulty-progress">
                        <div class="progress-bar"><div class="progress-fill" id="progress-hard"></div></div>
                        <span class="progress-text" id="progress-text-hard">0 / 10</span>
                    </div>
                </div>
                <div class="difficulty-card" data-difficulty="expert">
                    <div class="difficulty-header">
                        <span class="difficulty-name">전문가</span>
                        <span class="difficulty-stars">&#9733;&#9733;&#9733;&#9733;</span>
                    </div>
                    <div class="difficulty-progress">
                        <div class="progress-bar"><div class="progress-fill" id="progress-expert"></div></div>
                        <span class="progress-text" id="progress-text-expert">0 / 10</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 퍼즐 선택 화면 -->
        <div id="puzzle-select-screen" class="screen">
            <div class="screen-header">
                <button id="back-to-home" class="btn-back">&#8592; 뒤로</button>
                <h2 id="puzzle-select-title">쉬움</h2>
            </div>
            <div class="puzzle-grid" id="puzzle-grid"></div>
        </div>

        <!-- 게임 화면 -->
        <div id="game-screen" class="screen">
            <div class="screen-header">
                <button id="back-to-puzzles" class="btn-back">&#8592; 뒤로</button>
                <h2 id="game-title">쉬움 #1</h2>
                <div class="timer" id="timer">00:00</div>
            </div>
            <div class="board-container">
                <table id="sudoku-board"></table>
            </div>
            <div class="num-pad">
                <button class="num-btn" data-num="1">1</button>
                <button class="num-btn" data-num="2">2</button>
                <button class="num-btn" data-num="3">3</button>
                <button class="num-btn" data-num="4">4</button>
                <button class="num-btn" data-num="5">5</button>
                <button class="num-btn" data-num="6">6</button>
                <button class="num-btn" data-num="7">7</button>
                <button class="num-btn" data-num="8">8</button>
                <button class="num-btn" data-num="9">9</button>
                <button class="num-btn erase-btn" data-num="0">&#10005;</button>
            </div>
            <div class="game-actions">
                <button id="btn-memo" class="action-btn">메모</button>
                <button id="btn-hint" class="action-btn">힌트 <span id="hint-count">3</span></button>
                <button id="btn-check" class="action-btn">검사</button>
                <button id="btn-pause" class="action-btn">일시정지</button>
            </div>
            <div id="pause-overlay" class="pause-overlay">
                <div class="pause-content">
                    <h2>일시정지</h2>
                    <p>게임이 일시정지되었습니다</p>
                    <button id="btn-resume" class="btn-primary">계속하기</button>
                </div>
            </div>
        </div>

        <!-- 완료 모달 -->
        <div id="complete-modal" class="modal">
            <div class="modal-content">
                <h2>축하합니다!</h2>
                <p id="complete-time"></p>
                <div class="modal-buttons">
                    <button id="btn-next-puzzle" class="btn-primary">다음 퍼즐</button>
                    <button id="btn-go-home" class="btn-secondary">메인으로</button>
                </div>
            </div>
        </div>
    </div>

    <script src="puzzles.js"></script>
    <script src="app.js"></script>
</body>
</html>
